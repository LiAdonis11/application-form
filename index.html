<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <title>Job Application Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        <h1>Join the Team</h1>
        <p>Build the future with us. Skip the corporate fluff. Upload your resume, share your GitHub or portfolio link, and tell us about the most complex problem you have solved. Applications take less than 5 minutes.</p>

        <form>
            
            <label for="name" class="form-group">Full Name:
                <input type="text" id="name" name="name" placeholder="e.g., John Doe" required>
            </label>

            <label for="email" class="form-group">Email: 
                <input type="email" id="email" name="email" placeholder="e.g., johndoe@gmail.com" required>
            </label>
            <label for="profile" class="form-group">Profiles: 
                <input type="url" id="profile" name="profile" placeholder="e.g., https://github.com/johndoe" required>
            </label>

            <label for="position" class="position">Position:
            <select id="position" >
                <option value="role" selected>Choose Role</option>
                <option value="aiml">AI / Machine Learning Engineer</option>
                <option value="cloud">Cloud Architect / Engineer</option>
                <option value="cyber">Cybersecurity Analyst / Engineer</option>
                <option value="data">Data Scientist / Data Engineer</option>
                <option value="fullstack">Full-Stack Developer (with AI Specialization)</option>
            </select>
            </label>

            <fieldset class="radio-group">
                <legend>Employment Types</legend>
                <input type="radio" name="availability" id="full-time">
                <label for="full-time" class="types">Full-Time</label>
                <input type="radio" name="availability" id="part-time" >            
                <label for="part-time" class="types">Part-Time</label>
            </fieldset>

            <fieldset class="message">
                <legend>Message Us</legend>
                <label for="message"></label>
                <textarea id="message" cols="50" rows="50" placeholder="Type your message to us here..."></textarea>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
